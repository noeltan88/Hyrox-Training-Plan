function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function formatDateKey(year, month, day) {
  return `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}

    return logs;
  };

  const phase = phases[activePhase];

  const tabs = [
    { id: "hyrox", label: "🏋️ Hyrox" },
    { id: "running", label: "🏃 Running" },
    { id: "gym", label: "💪 Gym" },
    { id: "stations", label: "📋 Stations" },
    { id: "nutrition", label: "🥗 Nutrition" },
    { id: "log", label: "📓 Log" },
  ];

  function logWorkout(entry) {
    const key = todayKey();
    setWorkoutLogs(prev => { const next = { ...prev, [key]: entry }; persistLogs(next); return next; });
  }

  function deleteLog(key) {
    setWorkoutLogs(prev => {
      const next = { ...prev };
      delete next[key];
      return next;
    });
    setSelectedCalDay(null);
  }

  function editLog(key, updatedEntry) {
    setWorkoutLogs(prev => ({ ...prev, [key]: updatedEntry }));
  }

  return (
    <div style={{ fontFamily: "'DM Sans','Helvetica Neue',sans-serif", background: "#0a0a0f", color: "#e8e8f0", minHeight: "100vh" }}>

      {/* HEADER */}
      <div style={{ padding: "40px 24px 24px", borderBottom: "1px solid #1e1e2e", background: "linear-gradient(180deg,#0d0d1a 0%,#0a0a0f 100%)" }}>
        <div style={{ maxWidth: 720, margin: "0 auto" }}>
          <div style={{ display: "inline-block", background: "#1a1a2e", border: "1px solid #2a2a4a", borderRadius: 6, padding: "4px 12px", fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase", color: "#888", marginBottom: 16 }}>6-Month Program</div>
          <h1 style={{ fontSize: "clamp(28px,5vw,42px)", fontWeight: 800, margin: "0 0 8px", letterSpacing: "-0.03em", lineHeight: 1.1 }}>
            <span style={{ color: "#fff" }}>Hyrox & Running</span><br />
            <span style={{ background: `linear-gradient(90deg,${phase.color},${phase.accent})`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Training Plan</span>
          </h1>
          <p style={{ color: "#666", fontSize: 14, margin: 0 }}>4 days/week gym · Target: 6–6:30/km for 8km · Hyrox race-ready by December</p>
        </div>
      </div>

      <div style={{ maxWidth: 720, margin: "0 auto", padding: "0 24px" }}>

        {/* PHASE SELECTOR */}
        <div style={{ padding: "24px 0 0", display: "flex", gap: 8, flexWrap: "wrap" }}>
          {phases.map((p, i) => (
            <button key={p.id} onClick={() => setActivePhase(i)} style={{ background: activePhase === i ? p.color : "#141420", color: activePhase === i ? "#000" : "#666", border: `1px solid ${activePhase === i ? p.color : "#2a2a3e"}`, borderRadius: 8, padding: "10px 16px", fontSize: 13, fontWeight: 700, cursor: "pointer", transition: "all 0.2s" }}>
              {p.name} <span style={{ fontWeight: 400, fontSize: 11, opacity: 0.7 }}>{p.weeks}</span>
            </button>
          ))}
        </div>

        {/* PHASE HEADER */}
        <div style={{ marginTop: 16, padding: "20px", background: "#111118", border: `1px solid ${phase.color}33`, borderLeft: `3px solid ${phase.color}`, borderRadius: 12 }}>
          <h2 style={{ margin: 0, fontSize: 18, fontWeight: 800, color: phase.color }}>{phase.name}: {phase.subtitle}</h2>
          <div style={{ color: "#555", fontSize: 12, marginTop: 2 }}>{phase.weeks}</div>
          <p style={{ margin: "12px 0 0", fontSize: 13, color: "#888", lineHeight: 1.6 }}>{phase.description}</p>
        </div>

        {/* TABS */}
        <div style={{ display: "flex", gap: 6, marginTop: 20, flexWrap: "wrap" }}>
          {tabs.map(tab => {
            const activeColor = tab.id === "nutrition" ? "#a78bfa" : tab.id === "stations" ? "#f43f5e" : tab.id === "log" ? "#e879f9" : tab.id === "gym" ? "#38bdf8" : phase.color;
            const isActive = activeTab === tab.id;
            return (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{ flex: 1, minWidth: 60, padding: "11px 4px", background: isActive ? activeColor : "#111118", color: isActive ? "#000" : "#666", border: `1px solid ${isActive ? activeColor : "#2a2a3e"}`, borderRadius: 10, fontSize: 10, fontWeight: 700, cursor: "pointer", transition: "all 0.2s" }}>
                {tab.label}
              </button>
            );
          })}
        </div>

        {/* TAB CONTENT */}
        <div style={{ marginTop: 16, paddingBottom: 20 }}>

          {/* HYROX */}
          {activeTab === "hyrox" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {phase.hyrox.map((s, i) => (
                <LoggableSessionCard key={i} session={s} color={phase.color} type="hyrox" phaseName={phase.name} onLog={logWorkout} />
              ))}
            </div>
          )}

          {/* RUNNING */}
          {activeTab === "running" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {phase.running.map((s, i) => (
                <LoggableRunCard key={i} session={s} color={phase.color} phaseName={phase.name} onLog={logWorkout} />
              ))}
              <div style={{ marginTop: 4, padding: "16px", background: "#0d1a0d", border: `1px solid ${phase.color}44`, borderRadius: 12 }}>
                <div style={{ fontSize: 12, color: phase.color, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>🎯 Running Goal Progression</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  {[
                    { p: "Weeks 1–4", pace: "~7:30/km", dist: "3–5km" },
                    { p: "Weeks 5–10", pace: "~7:00/km", dist: "5–7km" },
                    { p: "Weeks 11–18", pace: "~6:15–6:30/km", dist: "7–9km" },
                    { p: "Weeks 19–24", pace: "6:00/km ✓", dist: "Race ready" },
                  ].map((r, i) => (
                    <div key={i} style={{ background: "#0a0a0f", borderRadius: 8, padding: "10px 12px", fontSize: 12 }}>
                      <div style={{ color: "#555", marginBottom: 2 }}>{r.p}</div>
                      <div style={{ color: phase.color, fontWeight: 700 }}>{r.pace}</div>
                      <div style={{ color: "#666", fontSize: 11 }}>{r.dist}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* STATIONS */}
          {activeTab === "stations" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <div style={{ padding: "14px 16px", background: "#1a0d0d", border: "1px solid #f43f5e44", borderRadius: 12 }}>
                <div style={{ fontSize: 11, color: "#f43f5e", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 6 }}>🏁 Race Format — Men's Open</div>
                <div style={{ fontSize: 13, color: "#ccc", lineHeight: 1.6 }}>8 × (1km run → 1 station) = 8km running + 8 stations</div>
                <div style={{ fontSize: 12, color: "#666", marginTop: 4 }}>Total race distance: ~10km with functional work. Average finish time: 75–100 min.</div>
              </div>
              {hyroxStations.map(s => <StationCard key={s.order} station={s} />)}
              <div style={{ padding: "14px 16px", background: "#0d0d1a", border: "1px solid #2a2a4a", borderRadius: 12, marginTop: 4 }}>
                <div style={{ fontSize: 11, color: "#a78bfa", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>⚡ Race Day Tips</div>
                {["You push and pull your own numbered sled — know your lane before the race starts.","Drop your heart rate slightly in the last 200m before each station.","Wall balls: sets of 20–25 with 5 sec rest. Don't go unbroken and blow up on the last station.","Farmers carry and sandbag lunges are time to make up places — most people walk these."].map((tip, i) => (
                  <div key={i} style={{ fontSize: 12, color: "#888", padding: "5px 0 5px 12px", borderLeft: "2px solid #2a2a4a", marginBottom: 4, lineHeight: 1.5 }}>{tip}</div>
                ))}
              </div>
            </div>
          )}

          {/* NUTRITION */}
          {activeTab === "nutrition" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <div style={{ background: "#111118", border: "1px solid #2a2040", borderRadius: 12, padding: 20 }}>
                <div style={{ fontSize: 11, color: "#a78bfa", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 12 }}>📊 Your Numbers (76kg, 178cm)</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
                  {[{ label: "Current weight", value: "76 kg" },{ label: "Target weight", value: "72–73 kg" },{ label: "TDEE (very active)", value: "~2,750 kcal" },{ label: "Avg daily deficit", value: "~400 kcal" }].map((item, i) => (
                    <div key={i} style={{ background: "#0a0a0f", borderRadius: 8, padding: "10px 12px" }}>
                      <div style={{ fontSize: 11, color: "#555", marginBottom: 3 }}>{item.label}</div>
                      <div style={{ fontSize: 14, fontWeight: 700, color: "#e8e8f0" }}>{item.value}</div>
                    </div>
                  ))}
                </div>
                <div style={{ background: "#1a1025", border: "1px solid #3d2060", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#b29bd4", lineHeight: 1.6 }}>
                  Strategy: eat near maintenance on training days to protect muscle and performance. Take the deficit on rest days. Averages ~400 kcal/day — enough for ~0.5kg/week without killing your workouts.
                </div>
              </div>
              {nutrition.days.map((day, i) => <NutritionDayCard key={i} day={day} />)}
              <div style={{ background: "#111118", border: "1px solid #1e1e2e", borderRadius: 12, padding: 20 }}>
                <div style={{ fontSize: 11, color: "#a78bfa", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 14 }}>🛒 Macro-Friendly Foods</div>
                {nutrition.foods.map((cat, i) => (
                  <div key={i} style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "#ccc", marginBottom: 6 }}>{cat.emoji} {cat.category}</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {cat.items.map((item, j) => (
                        <span key={j} style={{ fontSize: 11, color: "#888", background: "#0d0d14", border: "1px solid #1e1e2e", borderRadius: 20, padding: "4px 10px" }}>{item}</span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <div style={{ fontSize: 11, color: "#555", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 2 }}>Rules of the Kitchen</div>
                {nutrition.rules.map((rule, i) => (
                  <div key={i} style={{ display: "flex", gap: 12, padding: "12px 14px", background: "#111118", border: "1px solid #1e1e2e", borderRadius: 10 }}>
                    <span style={{ fontSize: 18, flexShrink: 0 }}>{rule.icon}</span>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#ccc", marginBottom: 2 }}>{rule.title}</div>
                      <div style={{ fontSize: 12, color: "#666", lineHeight: 1.5 }}>{rule.body}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* GYM */}
          {activeTab === "gym" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <div style={{ padding: "14px 16px", background: "#0d1a26", border: "1px solid #38bdf844", borderRadius: 12 }}>
                <div style={{ fontSize: 11, color: "#38bdf8", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 6 }}>💪 5-Day Upper/Lower Split</div>
                <div style={{ fontSize: 13, color: "#ccc", lineHeight: 1.6 }}>Upper A × 2 · Upper B × 2 · Legs × 1 — progressive overload focus</div>
                <div style={{ fontSize: 12, color: "#666", marginTop: 4 }}>Tap a day to expand, check off exercises, then hit Complete to log it.</div>
              </div>
              {gymDays.map((session, i) => (
                <LoggableSessionCard key={i} session={session} color={session.color} type="gym" phaseName="Gym Program" onLog={logWorkout} />
              ))}
            </div>
          )}

          {/* LOG TAB */}
          {activeTab === "log" && (
            <LogTab workoutLogs={workoutLogs} calMonth={calMonth} setCalMonth={setCalMonth} selectedCalDay={selectedCalDay} setSelectedCalDay={setSelectedCalDay} onDelete={deleteLog} onEdit={editLog} />
          )}

        </div>

        {/* WEEKLY STRUCTURE */}
        <div style={{ background: "#111118", border: "1px solid #1e1e2e", borderRadius: 12, padding: 20, marginBottom: 20 }}>
          <h3 style={{ margin: "0 0 16px", fontSize: 14, fontWeight: 700, color: "#fff", textTransform: "uppercase", letterSpacing: "0.08em" }}>📅 Weekly Structure</h3>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {[{ day: "Monday", type: "Hyrox", color: phase.color },{ day: "Tuesday", type: "Hyrox", color: phase.color },{ day: "Wednesday", type: "Run", color: "#60a5fa" },{ day: "Thursday", type: "Hyrox", color: phase.color },{ day: "Friday", type: "Run", color: "#60a5fa" },{ day: "Saturday", type: "Hyrox", color: phase.color },{ day: "Sunday", type: "Run (long)", color: "#60a5fa" }].map((item, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 12px", background: "#0a0a0f", borderRadius: 8 }}>
                <span style={{ fontSize: 13, color: "#888" }}>{item.day}</span>
                <span style={{ fontSize: 11, fontWeight: 700, color: item.color, background: `${item.color}15`, padding: "3px 10px", borderRadius: 20 }}>{item.type}</span>
              </div>
            ))}
          </div>
        </div>

        {/* COACH'S NOTES */}
        <div style={{ paddingBottom: 60 }}>
          <h3 style={{ fontSize: 13, fontWeight: 700, color: "#555", textTransform: "uppercase", letterSpacing: "0.1em", margin: "0 0 12px" }}>Coach's Notes</h3>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {tips.map((tip, i) => (
              <div key={i} style={{ display: "flex", gap: 12, padding: "12px 14px", background: "#111118", border: "1px solid #1e1e2e", borderRadius: 10 }}>
                <span style={{ fontSize: 18, flexShrink: 0 }}>{tip.icon}</span>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#ccc", marginBottom: 2 }}>{tip.title}</div>
                  <div style={{ fontSize: 12, color: "#666", lineHeight: 1.5 }}>{tip.body}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

      </div>
    </div>
  );
}

// ─── LOG TAB ──────────────────────────────────────────────────────────────────

function LogTab({ workoutLogs, calMonth, setCalMonth, selectedCalDay, setSelectedCalDay, onDelete, onEdit }) {
  const [editingKey, setEditingKey] = useState(null);
  const [editNote, setEditNote] = useState("");
  const [editChecked, setEditChecked] = useState({});
  const [confirmDeleteKey, setConfirmDeleteKey] = useState(null);

  const { year, month } = calMonth;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = todayKey();
  const totalLogs = Object.keys(workoutLogs).length;
  const hyroxCount = Object.values(workoutLogs).filter(l => l.type === "hyrox").length;
  const runCount = Object.values(workoutLogs).filter(l => l.type === "running").length;
  const gymCount = Object.values(workoutLogs).filter(l => l.type === "gym").length;

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const selectedKey = selectedCalDay ? formatDateKey(year, month, selectedCalDay) : null;
  const selectedLog = selectedKey ? workoutLogs[selectedKey] : null;

  function startEdit(key, log) {
    setEditingKey(key);
    setEditNote(log.note || "");
    const c = {};
    log.items.forEach((item, i) => { c[i] = item.checked; });
    setEditChecked(c);
  }

  function saveEdit(key, log) {
    const updatedItems = log.items.map((item, i) => ({ ...item, checked: !!editChecked[i] }));
    onEdit(key, { ...log, items: updatedItems, note: editNote });
    setEditingKey(null);
  }

  function handleDelete(key) {
    if (confirmDeleteKey === key) {
      onDelete(key);
      setConfirmDeleteKey(null);
    } else {
      setConfirmDeleteKey(key);
      setTimeout(() => setConfirmDeleteKey(null), 3000);
    }
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>

      {/* STATS STRIP */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8 }}>
        {[
          { label: "Total", value: totalLogs, color: "#e879f9" },
          { label: "Hyrox", value: hyroxCount, color: "#4ade80" },
          { label: "Runs", value: runCount, color: "#60a5fa" },
          { label: "Gym", value: gymCount, color: "#38bdf8" },
        ].map((s, i) => (
          <div key={i} style={{ background: "#111118", border: `1px solid ${s.color}33`, borderRadius: 10, padding: "12px 8px", textAlign: "center" }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: s.color }}>{s.value}</div>
            <div style={{ fontSize: 9, color: "#555", marginTop: 2, textTransform: "uppercase", letterSpacing: "0.08em" }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* CALENDAR */}
      <div style={{ background: "#111118", border: "1px solid #1e1e2e", borderRadius: 12, padding: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <button onClick={() => setCalMonth(prev => { const d = new Date(prev.year, prev.month - 1); return { year: d.getFullYear(), month: d.getMonth() }; })} style={{ background: "#1e1e2e", border: "none", color: "#aaa", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 16 }}>‹</button>
          <span style={{ fontWeight: 700, fontSize: 14, color: "#e8e8f0" }}>{MONTH_NAMES[month]} {year}</span>
          <button onClick={() => setCalMonth(prev => { const d = new Date(prev.year, prev.month + 1); return { year: d.getFullYear(), month: d.getMonth() }; })} style={{ background: "#1e1e2e", border: "none", color: "#aaa", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 16 }}>›</button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2, marginBottom: 6 }}>
          {DAY_LABELS.map(d => <div key={d} style={{ textAlign: "center", fontSize: 10, color: "#555", fontWeight: 700, padding: "4px 0" }}>{d}</div>)}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2 }}>
          {cells.map((day, i) => {
            if (!day) return <div key={i} />;
            const key = formatDateKey(year, month, day);
            const log = workoutLogs[key];
            const isToday = key === today;
            const isSelected = day === selectedCalDay;
            const dotColor = log ? (log.type === "hyrox" ? "#4ade80" : log.type === "gym" ? "#38bdf8" : "#60a5fa") : null;
            return (
              <button key={i} onClick={() => setSelectedCalDay(isSelected ? null : day)} style={{ background: isSelected ? "#2a2a3e" : "transparent", border: isToday ? "1px solid #e879f944" : "1px solid transparent", borderRadius: 8, padding: "6px 2px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                <span style={{ fontSize: 13, fontWeight: isToday ? 700 : 400, color: isToday ? "#e879f9" : log ? "#e8e8f0" : "#555" }}>{day}</span>
                {dotColor && <div style={{ width: 6, height: 6, borderRadius: "50%", background: dotColor }} />}
              </button>
            );
          })}
        </div>
        <div style={{ display: "flex", gap: 14, marginTop: 12, paddingTop: 12, borderTop: "1px solid #1e1e2e" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 5 }}><div style={{ width: 8, height: 8, borderRadius: "50%", background: "#4ade80" }} /><span style={{ fontSize: 11, color: "#555" }}>Hyrox</span></div>
          <div style={{ display: "flex", alignItems: "center", gap: 5 }}><div style={{ width: 8, height: 8, borderRadius: "50%", background: "#60a5fa" }} /><span style={{ fontSize: 11, color: "#555" }}>Run</span></div>
          <div style={{ display: "flex", alignItems: "center", gap: 5 }}><div style={{ width: 8, height: 8, borderRadius: "50%", background: "#38bdf8" }} /><span style={{ fontSize: 11, color: "#555" }}>Gym</span></div>
          <div style={{ display: "flex", alignItems: "center", gap: 5 }}><div style={{ width: 8, height: 8, borderRadius: "50%", background: "#e879f944", border: "1px solid #e879f9" }} /><span style={{ fontSize: 11, color: "#555" }}>Today</span></div>
        </div>
      </div>

      {/* SELECTED DAY LOG */}
      {selectedCalDay && (
        <div style={{ background: "#111118", border: `1px solid ${selectedLog ? (selectedLog.type === "hyrox" ? "#4ade8044" : "#60a5fa44") : "#1e1e2e"}`, borderRadius: 12, padding: 16 }}>
          <div style={{ fontSize: 11, color: "#555", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 10 }}>
            {MONTH_NAMES[month]} {selectedCalDay}, {year}
          </div>
          {selectedLog ? (
            editingKey === selectedKey ? (
              /* ── EDIT MODE ── */
              <div>
                <div style={{ fontSize: 12, color: "#888", fontWeight: 700, marginBottom: 10 }}>Editing — tap to toggle exercises</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 3, marginBottom: 14 }}>
                  {selectedLog.items.map((item, i) => {
                    const isDone = !!editChecked[i];
                    const typeColor = selectedLog.type === "hyrox" ? "#4ade80" : "#60a5fa";
                    return (
                      <button key={i} onClick={() => setEditChecked(prev => ({ ...prev, [i]: !prev[i] }))} style={{ width: "100%", background: isDone ? typeColor + "11" : "transparent", border: "none", borderRadius: 8, padding: "7px 10px 7px 8px", cursor: "pointer", display: "flex", alignItems: "flex-start", gap: 10, textAlign: "left" }}>
                        <div style={{ width: 20, height: 20, borderRadius: 6, border: `2px solid ${isDone ? typeColor : "#333"}`, background: isDone ? typeColor : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1, transition: "all 0.15s" }}>
                          {isDone && <span style={{ color: "#000", fontSize: 12, fontWeight: 800 }}>✓</span>}
                        </div>
                        <span style={{ fontSize: 13, color: isDone ? "#555" : "#aaa", textDecoration: isDone ? "line-through" : "none", lineHeight: 1.4 }}>{item.text}</span>
                      </button>
                    );
                  })}
                </div>
                <div style={{ fontSize: 11, color: "#555", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>Session note</div>
                <textarea value={editNote} onChange={e => setEditNote(e.target.value)} placeholder="How did it feel? Any PRs?" style={{ width: "100%", background: "#0a0a0f", border: "1px solid #2a2a3e", borderRadius: 8, padding: "8px 12px", color: "#aaa", fontSize: 12, resize: "none", height: 60, fontFamily: "inherit", marginBottom: 12 }} />
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => saveEdit(selectedKey, selectedLog)} style={{ flex: 1, background: "#4ade80", color: "#000", border: "none", borderRadius: 10, padding: "11px", fontSize: 13, fontWeight: 800, cursor: "pointer" }}>Save Changes</button>
                  <button onClick={() => setEditingKey(null)} style={{ flex: 1, background: "#1e1e2e", color: "#888", border: "none", borderRadius: 10, padding: "11px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Cancel</button>
                </div>
              </div>
            ) : (
              /* ── VIEW MODE ── */
              <div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 13, fontWeight: 700, background: selectedLog.type === "hyrox" ? "#4ade8022" : selectedLog.type === "gym" ? "#38bdf822" : "#60a5fa22", color: selectedLog.type === "hyrox" ? "#4ade80" : selectedLog.type === "gym" ? "#38bdf8" : "#60a5fa", padding: "4px 10px", borderRadius: 20, border: `1px solid ${selectedLog.type === "hyrox" ? "#4ade8044" : selectedLog.type === "gym" ? "#38bdf844" : "#60a5fa44"}` }}>
                      {selectedLog.type === "hyrox" ? "🏋️ Hyrox" : selectedLog.type === "gym" ? "💪 Gym" : "🏃 Run"}
                    </span>
                    <span style={{ fontSize: 13, color: "#ccc", fontWeight: 700 }}>{selectedLog.label}</span>
                  </div>
                  {/* Edit / Delete buttons */}
                  <div style={{ display: "flex", gap: 6 }}>
                    <button onClick={() => startEdit(selectedKey, selectedLog)} style={{ background: "#1e1e2e", border: "none", color: "#aaa", borderRadius: 8, padding: "6px 10px", fontSize: 12, cursor: "pointer", fontWeight: 600 }}>✏️ Edit</button>
                    <button onClick={() => handleDelete(selectedKey)} style={{ background: confirmDeleteKey === selectedKey ? "#f43f5e" : "#1e1e2e", border: "none", color: confirmDeleteKey === selectedKey ? "#fff" : "#f43f5e", borderRadius: 8, padding: "6px 10px", fontSize: 12, cursor: "pointer", fontWeight: 700, transition: "all 0.2s" }}>
                      {confirmDeleteKey === selectedKey ? "Confirm?" : "🗑 Delete"}
                    </button>
                  </div>
                </div>
                <div style={{ fontSize: 11, color: "#555", marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.08em" }}>{selectedLog.phaseName} · Logged at {selectedLog.time}</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                  {selectedLog.items.map((item, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 8, fontSize: 12, color: item.checked ? "#555" : "#aaa", padding: "4px 0" }}>
                      <span style={{ color: item.checked ? "#4ade80" : "#333", fontSize: 13, flexShrink: 0, marginTop: 1 }}>{item.checked ? "✓" : "○"}</span>
                      <span style={{ textDecoration: item.checked ? "line-through" : "none", lineHeight: 1.4 }}>{item.text}</span>
                    </div>
                  ))}
                </div>
                {selectedLog.note && (
                  <div style={{ marginTop: 10, fontSize: 12, color: "#666", fontStyle: "italic", padding: "8px 12px", background: "#0a0a0f", borderRadius: 8 }}>"{selectedLog.note}"</div>
                )}
              </div>
            )
          ) : (
            <div style={{ fontSize: 13, color: "#444", textAlign: "center", padding: "20px 0" }}>No workout logged for this day</div>
          )}
        </div>
      )}

      {/* RECENT LOG LIST */}
      {totalLogs > 0 && (
        <div>
          <div style={{ fontSize: 11, color: "#555", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 10 }}>Recent Sessions</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {Object.entries(workoutLogs).sort((a, b) => b[0].localeCompare(a[0])).slice(0, 10).map(([key, log]) => {
              const [y, m, d] = key.split("-");
              const typeColor = log.type === "hyrox" ? "#4ade80" : log.type === "gym" ? "#38bdf8" : "#60a5fa";
              const checkedCount = log.items.filter(i => i.checked).length;
              const isEditing = editingKey === key;
              return (
                <div key={key} style={{ background: "#111118", border: `1px solid ${typeColor}22`, borderLeft: `3px solid ${typeColor}`, borderRadius: 10, padding: "12px 14px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#e8e8f0" }}>{log.label}</div>
                      <div style={{ fontSize: 11, color: typeColor, marginTop: 2 }}>{log.type === "hyrox" ? "🏋️ Hyrox" : log.type === "gym" ? "💪 Gym" : "🏃 Run"} · {log.phaseName}</div>
                      {log.note && <div style={{ fontSize: 11, color: "#555", marginTop: 4, fontStyle: "italic" }}>"{log.note}"</div>}
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6, flexShrink: 0 }}>
                      <div style={{ fontSize: 11, color: "#555" }}>{d}/{m}/{y}</div>
                      <div style={{ fontSize: 11, color: checkedCount === log.items.length ? "#4ade80" : "#facc15" }}>{checkedCount}/{log.items.length} done</div>
                      <div style={{ display: "flex", gap: 4 }}>
                        <button onClick={() => { startEdit(key, log); setSelectedCalDay(null); }} style={{ background: "#1e1e2e", border: "none", color: "#aaa", borderRadius: 6, padding: "4px 8px", fontSize: 11, cursor: "pointer" }}>✏️</button>
                        <button onClick={() => handleDelete(key)} style={{ background: confirmDeleteKey === key ? "#f43f5e22" : "#1e1e2e", border: `1px solid ${confirmDeleteKey === key ? "#f43f5e" : "transparent"}`, color: confirmDeleteKey === key ? "#f43f5e" : "#666", borderRadius: 6, padding: "4px 8px", fontSize: 11, cursor: "pointer", fontWeight: 700, transition: "all 0.2s" }}>
                          {confirmDeleteKey === key ? "Sure?" : "🗑"}
                        </button>
                      </div>
                    </div>
                  </div>
                  {/* Inline edit panel for list items */}
                  {isEditing && (
                    <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid #1e1e2e" }}>
                      <div style={{ fontSize: 11, color: "#888", marginBottom: 8 }}>Tap to toggle · edit note below</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 2, marginBottom: 10 }}>
                        {log.items.map((item, i) => {
                          const isDone = !!editChecked[i];
                          return (
                            <button key={i} onClick={() => setEditChecked(prev => ({ ...prev, [i]: !prev[i] }))} style={{ width: "100%", background: isDone ? typeColor + "11" : "transparent", border: "none", borderRadius: 6, padding: "5px 8px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8, textAlign: "left" }}>
                              <div style={{ width: 18, height: 18, borderRadius: 5, border: `2px solid ${isDone ? typeColor : "#333"}`, background: isDone ? typeColor : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.15s" }}>
                                {isDone && <span style={{ color: "#000", fontSize: 10, fontWeight: 800 }}>✓</span>}
                              </div>
                              <span style={{ fontSize: 12, color: isDone ? "#555" : "#aaa", textDecoration: isDone ? "line-through" : "none" }}>{item.text}</span>
                            </button>
                          );
                        })}
                      </div>
                      <textarea value={editNote} onChange={e => setEditNote(e.target.value)} placeholder="Session note..." style={{ width: "100%", background: "#0a0a0f", border: "1px solid #2a2a3e", borderRadius: 8, padding: "8px 12px", color: "#aaa", fontSize: 12, resize: "none", height: 50, fontFamily: "inherit", marginBottom: 8 }} />
                      <div style={{ display: "flex", gap: 6 }}>
                        <button onClick={() => saveEdit(key, log)} style={{ flex: 1, background: typeColor, color: "#000", border: "none", borderRadius: 8, padding: "9px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>Save</button>
                        <button onClick={() => setEditingKey(null)} style={{ flex: 1, background: "#1e1e2e", color: "#888", border: "none", borderRadius: 8, padding: "9px", fontSize: 12, cursor: "pointer" }}>Cancel</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {totalLogs === 0 && (
        <div style={{ textAlign: "center", padding: "32px 0" }}>
          <div style={{ fontSize: 32, marginBottom: 12 }}>📓</div>
          <div style={{ fontSize: 14, color: "#444" }}>No workouts logged yet</div>
          <div style={{ fontSize: 12, color: "#333", marginTop: 6 }}>Go to Hyrox or Running, expand a session, check off exercises, and hit Complete</div>
        </div>
      )}
    </div>
  );
}

// ─── LOGGABLE SESSION CARD (HYROX + GYM) ─────────────────────────────────────

const GYM_WEIGHTS_KEY = "hyrox_gym_weights";

function loadSavedWeights() {
  try { const s = localStorage.getItem(GYM_WEIGHTS_KEY); return s ? JSON.parse(s) : {}; } catch(e) { return {}; }
}
function saveWeights(data) {
  try { localStorage.setItem(GYM_WEIGHTS_KEY, JSON.stringify(data)); } catch(e) {}
}

function LoggableSessionCard({ session, color, type, phaseName, onLog }) {
  const [open, setOpen] = useState(false);
  const allItems = session.blocks.flatMap(b => b.details.map(d => ({ text: d, blockTitle: b.title })));
  const [checked, setChecked] = useState({});
  const [note, setNote] = useState("");
  const [completed, setCompleted] = useState(false);
  const isGym = type === "gym";

  // Weight/reps state — keyed by a stable exercise key (session label + exercise text)
  const [exerciseData, setExerciseData] = useState(() => {
    if (!isGym) return {};
    const saved = loadSavedWeights();
    const data = {};
    allItems.forEach((item, idx) => {
      const key = `${session.label}__${idx}`;
      data[idx] = { weight: saved[key]?.weight || "", reps: saved[key]?.reps || "" };
    });
    return data;
  });

  const checkedCount = Object.values(checked).filter(Boolean).length;

  function toggleItem(idx) {
    setChecked(prev => ({ ...prev, [idx]: !prev[idx] }));
  }

  function updateExerciseField(idx, field, value) {
    setExerciseData(prev => {
      const next = { ...prev, [idx]: { ...prev[idx], [field]: value } };
      // Persist to localStorage immediately
      const saved = loadSavedWeights();
      const key = `${session.label}__${idx}`;
      saved[key] = { weight: next[idx].weight, reps: next[idx].reps };
      saveWeights(saved);
      return next;
    });
  }

  function handleComplete() {
    const items = allItems.map((item, idx) => {
      const ed = exerciseData[idx];
      const suffix = isGym && (ed?.weight || ed?.reps) ? ` [${ed?.weight ? ed.weight + "kg" : ""}${ed?.weight && ed?.reps ? " · " : ""}${ed?.reps ? ed.reps + " reps" : ""}]` : "";
      return { text: item.text + suffix, checked: !!checked[idx] };
    });
    const now = new Date();
    const timeStr = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    onLog({ type, label: session.label, phaseName, items, note, time: timeStr, color });
    setCompleted(true);
    setTimeout(() => setCompleted(false), 3000);
  }

  return (
    <div style={{ background: "#111118", border: `1px solid ${open ? color + "44" : "#1e1e2e"}`, borderRadius: 12, overflow: "hidden", transition: "border-color 0.2s" }}>
      <button onClick={() => setOpen(!open)} style={{ width: "100%", background: "none", border: "none", padding: "14px 16px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", textAlign: "left" }}>
        <div>
          <span style={{ fontSize: 11, color: "#555", textTransform: "uppercase", letterSpacing: "0.08em" }}>{session.day}</span>
          <div style={{ fontSize: 15, fontWeight: 700, color: "#e8e8f0", marginTop: 2 }}>{session.label}</div>
          <div style={{ fontSize: 12, color, marginTop: 1 }}>{session.focus}</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {checkedCount > 0 && <span style={{ fontSize: 11, color: "#4ade80", background: "#4ade8015", padding: "2px 8px", borderRadius: 20 }}>{checkedCount}/{allItems.length}</span>}
          <span style={{ color: "#555", fontSize: 18, transition: "transform 0.2s", transform: open ? "rotate(180deg)" : "none" }}>▾</span>
        </div>
      </button>
      {open && (
        <div style={{ padding: "0 16px 16px", borderTop: "1px solid #1e1e2e" }}>
          {isGym && (
            <div style={{ display: "flex", gap: 6, marginTop: 12, marginBottom: 2 }}>
              <div style={{ flex: 1 }} />
              <div style={{ width: 64, fontSize: 9, color: "#555", textAlign: "center", textTransform: "uppercase", letterSpacing: "0.08em" }}>kg</div>
              <div style={{ width: 64, fontSize: 9, color: "#555", textAlign: "center", textTransform: "uppercase", letterSpacing: "0.08em" }}>reps</div>
            </div>
          )}
          {session.blocks.map((block, bi) => {
            const blockStartIdx = session.blocks.slice(0, bi).reduce((acc, b) => acc + b.details.length, 0);
            return (
              <div key={bi} style={{ marginTop: 14 }}>
                <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", color, marginBottom: 6 }}>{block.title}</div>
                {block.details.map((d, di) => {
                  const idx = blockStartIdx + di;
                  const isDone = !!checked[idx];
                  const ed = exerciseData[idx] || { weight: "", reps: "" };
                  return (
                    <div key={di} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                      {/* Checkbox + label */}
                      <button onClick={() => toggleItem(idx)} style={{ flex: 1, background: isDone ? color + "11" : "transparent", border: "none", borderRadius: 8, padding: "7px 8px", cursor: "pointer", display: "flex", alignItems: "flex-start", gap: 8, textAlign: "left", minWidth: 0 }}>
                        <div style={{ width: 20, height: 20, borderRadius: 6, border: `2px solid ${isDone ? color : "#333"}`, background: isDone ? color : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1, transition: "all 0.15s" }}>
                          {isDone && <span style={{ color: "#000", fontSize: 12, fontWeight: 800 }}>✓</span>}
                        </div>
                        <span style={{ fontSize: 12, color: isDone ? "#555" : "#aaa", textDecoration: isDone ? "line-through" : "none", lineHeight: 1.4 }}>{d}</span>
                      </button>
                      {/* Weight + Reps inputs — only for gym */}
                      {isGym && (
                        <>
                          <input
                            type="number"
                            inputMode="decimal"
                            placeholder="—"
                            value={ed.weight}
                            onChange={e => updateExerciseField(idx, "weight", e.target.value)}
                            onClick={e => e.stopPropagation()}
                            style={{ width: 64, background: "#0a0a0f", border: `1px solid ${ed.weight ? color + "66" : "#2a2a3e"}`, borderRadius: 8, padding: "6px 8px", color: ed.weight ? color : "#555", fontSize: 13, fontWeight: 700, textAlign: "center", outline: "none", fontFamily: "inherit" }}
                          />
                          <input
                            type="number"
                            inputMode="numeric"
                            placeholder="—"
                            value={ed.reps}
                            onChange={e => updateExerciseField(idx, "reps", e.target.value)}
                            onClick={e => e.stopPropagation()}
                            style={{ width: 64, background: "#0a0a0f", border: `1px solid ${ed.reps ? color + "66" : "#2a2a3e"}`, borderRadius: 8, padding: "6px 8px", color: ed.reps ? color : "#555", fontSize: 13, fontWeight: 700, textAlign: "center", outline: "none", fontFamily: "inherit" }}
                          />
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })}
          {/* Note field */}
          <div style={{ marginTop: 14 }}>
            <div style={{ fontSize: 11, color: "#555", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>Session note (optional)</div>
            <textarea value={note} onChange={e => setNote(e.target.value)} placeholder={isGym ? "How did it go? Any new PRs?" : "How did it feel? Any PRs?"} style={{ width: "100%", background: "#0a0a0f", border: "1px solid #2a2a3e", borderRadius: 8, padding: "8px 12px", color: "#aaa", fontSize: 12, resize: "none", height: 60, fontFamily: "inherit" }} />
          </div>
          {/* Complete button */}
          <button onClick={handleComplete} style={{ marginTop: 12, width: "100%", background: completed ? "#4ade80" : color, color: "#000", border: "none", borderRadius: 10, padding: "13px", fontSize: 13, fontWeight: 800, cursor: "pointer", transition: "all 0.2s", letterSpacing: "0.02em" }}>
            {completed ? "✓ Logged!" : `Complete ${session.label}`}
          </button>
          {checkedCount > 0 && <div style={{ textAlign: "center", fontSize: 11, color: "#555", marginTop: 6 }}>{checkedCount} of {allItems.length} exercises checked</div>}
        </div>
      )}
    </div>
  );
}

// ─── LOGGABLE RUN CARD ────────────────────────────────────────────────────────

function LoggableRunCard({ session, color, phaseName, onLog }) {

    setChecked(prev => ({ ...prev, [idx]: !prev[idx] }));
  }

  function handleComplete() {
    const items = session.details.map((text, idx) => ({ text, checked: !!checked[idx] }));

              );
            })}
          </div>
          {/* Note field */}
          <div style={{ marginTop: 14 }}>
            <div style={{ fontSize: 11, color: "#444", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>Session note (optional)</div>

          </div>
          {/* Complete button */}
          <button onClick={handleComplete} style={{ marginTop: 12, width: "100%", background: completed ? "#4ade80" : "#60a5fa", color: "#000", border: "none", borderRadius: 10, padding: "13px", fontSize: 13, fontWeight: 800, cursor: "pointer", transition: "all 0.2s" }}>
            {completed ? "✓ Logged!" : `Complete ${session.label}`}

          {checkedCount > 0 && <div style={{ textAlign: "center", fontSize: 11, color: "#444", marginTop: 6 }}>{checkedCount} of {session.details.length} steps checked</div>}

// ─── NUTRITION DAY CARD ───────────────────────────────────────────────────────

function NutritionDayCard({ day }) {
  const [open, setOpen] = useState(false);
  const macros = [
    { label: "Calories", value: String(day.calories), unit: "kcal", color: day.color, pct: null },
    { label: "Protein", value: `${day.protein}g`, unit: "", color: "#ccc", pct: Math.round((day.protein * 4 / day.calories) * 100) },
    { label: "Carbs", value: `${day.carbs}g`, unit: "", color: "#ccc", pct: Math.round((day.carbs * 4 / day.calories) * 100) },
    { label: "Fat", value: `${day.fat}g`, unit: "", color: "#ccc", pct: Math.round((day.fat * 9 / day.calories) * 100) },
  ];
  return (
    <div style={{ background: "#111118", border: `1px solid ${open ? day.color + "55" : "#1e1e2e"}`, borderRadius: 12, overflow: "hidden", transition: "border-color 0.2s" }}>
      <button onClick={() => setOpen(!open)} style={{ width: "100%", background: "none", border: "none", padding: "14px 16px", cursor: "pointer", textAlign: "left" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: "#e8e8f0" }}>{day.label}</div>
            <div style={{ fontSize: 12, color: day.color, marginTop: 2 }}>{day.subtitle}</div>
          </div>
          <span style={{ color: "#555", fontSize: 18, transition: "transform 0.2s", transform: open ? "rotate(180deg)" : "none" }}>▾</span>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          {macros.map((m, i) => (
            <div key={i} style={{ background: "#0a0a0f", border: `1px solid ${i === 0 ? day.color + "44" : "#1e1e2e"}`, borderRadius: 8, padding: "8px 8px", flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 9, color: "#555", marginBottom: 2, textTransform: "uppercase", letterSpacing: "0.05em" }}>{m.label}</div>
              <div style={{ fontSize: 12, fontWeight: 700, color: m.color }}>{m.value}<span style={{ fontSize: 9, color: "#555" }}>{m.unit}</span></div>
              {m.pct !== null && <div style={{ fontSize: 9, color: "#444", marginTop: 1 }}>{m.pct}%</div>}
            </div>
          ))}
        </div>
      </button>
      {open && (
        <div style={{ padding: "0 16px 16px", borderTop: "1px solid #1e1e2e" }}>
          <div style={{ fontSize: 11, color: day.color, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", margin: "14px 0 10px" }}>Meal Timing</div>
          {day.timing.map((slot, i) => (
            <div key={i} style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#aaa", marginBottom: 4 }}>{slot.time}</div>
              {slot.items.map((item, j) => (
                <div key={j} style={{ fontSize: 12, color: "#666", padding: "4px 0 4px 12px", borderLeft: "2px solid #2a2a3e", marginBottom: 2, lineHeight: 1.4 }}>{item}</div>
              ))}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<HyroxPlan />);
</script>
</body>
</html>
